services:
  - type: web
    name: tabi-backend
    runtime: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && playwright install chromium --with-deps"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: OPENROUTER_API_KEY
        sync: false
      - key: UNSPLASH_ACCESS_KEY
        sync: false
