services:
  - type: web
    name: tabi-backend
    runtime: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && playwright install chromium"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: OPENROUTER_API_KEY
        sync: false
      - key: UNSPLASH_ACCESS_KEY
        sync: false
    nativePackages:
      - libnss3
      - libnspr4
      - libatk1.0-0
      - libatk-bridge2.0-0
      - libcups2
      - libdbus-1-3
      - libdrm2
      - libgbm1
      - libx11-6
      - libxcomposite1
      - libxdamage1
      - libxext6
      - libxfixes3
      - libxrandr2
      - libxss1
      - libxtst6
      - libpango-1.0-0
      - libcairo2
      - libasound2
